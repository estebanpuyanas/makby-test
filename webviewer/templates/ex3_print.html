<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Exercise 3 — 3D Biomodel Proposal (Print)</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 11pt;
        color: #111;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1.5rem 3rem;
        line-height: 1.7;
      }

      h1 {
        font-size: 1.6rem;
        margin: 1.2rem 0 0.4rem;
        border-bottom: 1px solid #bbb;
        padding-bottom: 0.25rem;
      }
      h2 {
        font-size: 1.2rem;
        margin: 1rem 0 0.25rem;
      }
      h3 {
        font-size: 1rem;
        margin: 0.8rem 0 0.2rem;
        color: #333;
      }
      p {
        margin: 0.4rem 0;
      }
      ul,
      ol {
        margin: 0.4rem 0 0.4rem 1.5rem;
      }
      li {
        margin: 0.2rem 0;
      }
      a {
        color: #333;
      }
      sup {
        font-size: 0.72rem;
      }
      .footnote {
        font-size: 0.8rem;
        color: #555;
        border-top: 1px solid #ccc;
        margin-top: 1.5rem;
        padding-top: 0.4rem;
      }

      /* Print-only controls */
      .print-bar {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
      }
      .btn {
        display: inline-block;
        padding: 0.4rem 0.9rem;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
      }
      .btn-primary {
        background: #89b4fa;
        color: #1e1e2e;
      }
      .btn-back {
        background: #eee;
        color: #333;
      }

      @media print {
        .print-bar {
          display: none;
        }
        body {
          margin: 0;
          padding: 0 1cm 2cm;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="print-bar">
      <button class="btn btn-primary" onclick="window.print()">
        Print / Save as PDF
      </button>
      <a class="btn btn-back" href="/exercise/3">&#8592; Back</a>
    </div>

    {{ md_html|safe }}
  </body>
</html>
